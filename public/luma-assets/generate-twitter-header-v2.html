<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Emergence Twitter Header V2 - Centered High</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #000;
    }
    .canvas {
      width: 1500px;
      height: 500px;
      position: relative;
      background: #EAF8F5;
      overflow: hidden;
    }
    /* Grid pattern background */
    .grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(#251720 1px, transparent 1px);
      background-size: 32px 32px;
      background-position: -1px -1px;
      opacity: 0.4;
    }
    /* Network nodes pattern - smaller, on sides */
    .network-nodes-left {
      position: absolute;
      top: 60px;
      left: 80px;
      width: 200px;
      height: 200px;
    }
    .network-nodes-right {
      position: absolute;
      top: 80px;
      right: 100px;
      width: 180px;
      height: 180px;
    }
    .node {
      position: absolute;
      border-radius: 50%;
      border: 3px solid #251720;
    }
    .node-yellow {
      background: #FFD600;
      box-shadow: 0 4px 20px rgba(255, 214, 0, 0.4);
    }
    .node-emerald {
      background: #00D27F;
      box-shadow: 0 4px 20px rgba(0, 210, 127, 0.4);
    }
    /* Connection lines */
    .connection {
      position: absolute;
      background: #251720;
      transform-origin: 0 0;
    }
    /* Content */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 80px 200px 200px 200px;
      z-index: 10;
    }
    h1 {
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 140px;
      letter-spacing: -0.03em;
      color: #251720;
      text-transform: uppercase;
      line-height: 0.9;
      margin-bottom: 24px;
      text-align: center;
    }
    .date {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 0.1em;
      color: #00D27F;
      text-transform: uppercase;
      text-align: center;
    }
    /* Border accent */
    .border-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #251720;
    }
    .border-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #251720;
    }
    .border-left {
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: #251720;
    }
    .border-right {
      position: absolute;
      top: 0;
      right: 0;
      width: 3px;
      height: 100%;
      background: #251720;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <!-- Borders -->
    <div class="border-top"></div>
    <div class="border-bottom"></div>
    <div class="border-left"></div>
    <div class="border-right"></div>

    <!-- Grid background -->
    <div class="grid-bg"></div>

    <!-- Network nodes pattern - left side -->
    <div class="network-nodes-left">
      <div class="connection" style="width: 80px; height: 3px; top: 40px; left: 30px; transform: rotate(45deg);"></div>
      <div class="node node-yellow" style="width: 40px; height: 40px; top: 30px; left: 20px;"></div>
      <div class="node node-emerald" style="width: 48px; height: 48px; top: 80px; left: 80px;"></div>
      <div class="node node-yellow" style="width: 36px; height: 36px; top: 120px; left: 50px;"></div>
    </div>

    <!-- Network nodes pattern - right side -->
    <div class="network-nodes-right">
      <div class="connection" style="width: 70px; height: 3px; top: 50px; left: 40px; transform: rotate(-40deg);"></div>
      <div class="node node-emerald" style="width: 44px; height: 44px; top: 40px; left: 30px;"></div>
      <div class="node node-yellow" style="width: 52px; height: 52px; top: 90px; left: 90px;"></div>
      <div class="node node-emerald" style="width: 38px; height: 38px; top: 130px; left: 60px;"></div>
    </div>

    <!-- Main content -->
    <div class="content">
      <h1>EMERGENCE</h1>
      <div class="date">APRIL 28-30, 2026 // LONDON</div>
    </div>
  </div>

  <script>
    console.log('Screenshot this at 1500x500px (Twitter header dimensions)');
    console.log('V2 - Centered High: Content positioned high with nodes flanking sides');
  </script>
</body>
</html>
