<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Emergence Luma Sharing Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #000;
    }
    .canvas {
      width: 1200px;
      height: 630px;
      position: relative;
      background: #251720;
      overflow: hidden;
    }
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.3;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(0, 210, 127, 0.2) 0%, rgba(37, 23, 32, 0.7) 100%);
    }
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
    }
    .logo-mark {
      width: 48px;
      height: 48px;
      background: #FFD600;
      border: 5px solid #FFF;
      border-radius: 50%;
      margin-bottom: 32px;
      box-shadow: 0 4px 24px rgba(255, 214, 0, 0.5);
    }
    h1 {
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 96px;
      letter-spacing: -0.03em;
      color: #FFF;
      text-transform: uppercase;
      text-shadow: 4px 4px 0px rgba(0, 210, 127, 0.4);
      margin-bottom: 20px;
      line-height: 1;
    }
    .subtitle {
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 36px;
      color: #00D27F;
      text-transform: uppercase;
      margin-bottom: 32px;
      line-height: 1.2;
    }
    .date {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 0.08em;
      color: #FFD600;
      text-transform: uppercase;
    }
    .accent-bar {
      width: 120px;
      height: 6px;
      background: #00D27F;
      margin: 24px 0;
    }
    .stats {
      position: absolute;
      bottom: 80px;
      right: 80px;
      display: flex;
      gap: 48px;
    }
    .stat {
      text-align: right;
    }
    .stat-value {
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 48px;
      color: #00D27F;
      line-height: 1;
    }
    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img src="sharing-raw.jpg" class="bg-image" alt="">
    <div class="overlay"></div>
    <div class="content">
      <div class="logo-mark"></div>
      <h1>EMERGENCE<br>LONDON 2026</h1>
      <div class="accent-bar"></div>
      <div class="subtitle">Mapping London's<br>Tech Ecosystem</div>
      <div class="date">APRIL 28-30 // SHOREDITCH</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-value">100+</div>
        <div class="stat-label">Events</div>
      </div>
      <div class="stat">
        <div class="stat-value">320+</div>
        <div class="stat-label">Companies</div>
      </div>
    </div>
  </div>

  <script>
    // Instructions: Open this file in a browser, then take a screenshot at exactly 1200x630
    console.log('Screenshot this at 1200x630px');
  </script>
</body>
</html>
