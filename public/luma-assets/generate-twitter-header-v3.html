<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Emergence Twitter Header V3 - Minimal Bold</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #000;
    }
    .canvas {
      width: 1500px;
      height: 500px;
      position: relative;
      background: #EAF8F5;
      overflow: hidden;
    }
    /* Grid pattern background */
    .grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(#251720 1px, transparent 1px);
      background-size: 32px 32px;
      background-position: -1px -1px;
      opacity: 0.3;
    }
    /* Content */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 100px 200px 100px;
      z-index: 10;
    }
    h1 {
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 180px;
      letter-spacing: -0.03em;
      color: #251720;
      text-transform: uppercase;
      line-height: 0.9;
      margin-bottom: 32px;
      text-align: center;
    }
    .date {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: 0.12em;
      color: #5A4C55;
      text-transform: uppercase;
      text-align: center;
    }
    /* Border accent */
    .border-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #251720;
    }
    .border-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #251720;
    }
    .border-left {
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: #251720;
    }
    .border-right {
      position: absolute;
      top: 0;
      right: 0;
      width: 3px;
      height: 100%;
      background: #251720;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <!-- Borders -->
    <div class="border-top"></div>
    <div class="border-bottom"></div>
    <div class="border-left"></div>
    <div class="border-right"></div>

    <!-- Grid background -->
    <div class="grid-bg"></div>

    <!-- Main content -->
    <div class="content">
      <h1>EMERGENCE</h1>
      <div class="date">APRIL 28-30, 2026 // LONDON</div>
    </div>
  </div>

  <script>
    console.log('Screenshot this at 1500x500px (Twitter header dimensions)');
    console.log('V3 - Minimal Bold: Clean wordmark-focused design');
  </script>
</body>
</html>
