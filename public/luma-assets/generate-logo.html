<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Emergence Luma Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #000;
    }
    .canvas {
      width: 512px;
      height: 512px;
      position: relative;
      background: linear-gradient(135deg, #EAF8F5 0%, #00D27F 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(#251720 2px, transparent 2px),
        linear-gradient(90deg, #251720 2px, transparent 2px);
      background-size: 64px 64px;
      opacity: 0.1;
    }
    .logo-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .node {
      width: 160px;
      height: 160px;
      background: #FFD600;
      border: 8px solid #251720;
      border-radius: 50%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      position: relative;
    }
    .node::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 60%;
      background: #251720;
      border-radius: 50%;
    }
    .letter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 100px;
      color: #FFD600;
      z-index: 1;
    }
    .text {
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 48px;
      letter-spacing: -0.02em;
      color: #251720;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="grid"></div>
    <div class="logo-container">
      <div class="node">
        <div class="letter">E</div>
      </div>
      <div class="text">EMERGENCE</div>
    </div>
  </div>

  <script>
    // Instructions: Open this file in a browser, then take a screenshot at exactly 512x512
    console.log('Screenshot this at 512x512px');
  </script>
</body>
</html>
