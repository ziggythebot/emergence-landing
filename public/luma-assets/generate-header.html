<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Emergence Luma Header</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #000;
    }
    .canvas {
      width: 1400px;
      height: 400px;
      position: relative;
      background: #251720;
      overflow: hidden;
    }
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.4;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(0, 210, 127, 0.15) 0%, rgba(37, 23, 32, 0.6) 100%);
    }
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px;
    }
    .logo-mark {
      width: 36px;
      height: 36px;
      background: #FFD600;
      border: 4px solid #FFF;
      border-radius: 50%;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(255, 214, 0, 0.4);
    }
    h1 {
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 120px;
      letter-spacing: -0.03em;
      color: #FFF;
      text-transform: uppercase;
      text-shadow: 4px 4px 0px rgba(0, 210, 127, 0.3);
      margin-bottom: 16px;
      line-height: 1;
    }
    .date {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: 0.1em;
      color: #00D27F;
      text-transform: uppercase;
      text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
    }
    .accent-line {
      width: 200px;
      height: 4px;
      background: #FFD600;
      margin: 20px auto;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img src="header-raw.jpg" class="bg-image" alt="">
    <div class="overlay"></div>
    <div class="content">
      <div class="logo-mark"></div>
      <h1>EMERGENCE</h1>
      <div class="accent-line"></div>
      <div class="date">APRIL 28-30, 2026 // LONDON</div>
    </div>
  </div>

  <script>
    // Instructions: Open this file in a browser, then take a screenshot at exactly 1400x400
    console.log('Screenshot this at 1400x400px');
  </script>
</body>
</html>
