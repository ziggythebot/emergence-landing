<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Emergence Twitter Header V4 - Network Heavy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #000;
    }
    .canvas {
      width: 1500px;
      height: 500px;
      position: relative;
      background: #EAF8F5;
      overflow: hidden;
    }
    /* Grid pattern background */
    .grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(#251720 1px, transparent 1px);
      background-size: 32px 32px;
      background-position: -1px -1px;
      opacity: 0.4;
    }
    /* Large network graph on right side */
    .network-nodes {
      position: absolute;
      top: 0;
      right: 0;
      width: 700px;
      height: 500px;
    }
    .node {
      position: absolute;
      border-radius: 50%;
      border: 3px solid #251720;
    }
    .node-yellow {
      background: #FFD600;
      box-shadow: 0 6px 30px rgba(255, 214, 0, 0.5);
    }
    .node-emerald {
      background: #00D27F;
      box-shadow: 0 6px 30px rgba(0, 210, 127, 0.5);
    }
    /* Connection lines */
    .connection {
      position: absolute;
      background: #251720;
      transform-origin: 0 0;
    }
    /* Content - upper right */
    .content {
      position: absolute;
      top: 50px;
      right: 80px;
      z-index: 10;
      text-align: right;
    }
    h1 {
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 100px;
      letter-spacing: -0.03em;
      color: #251720;
      text-transform: uppercase;
      line-height: 0.9;
      margin-bottom: 20px;
    }
    .date {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.1em;
      color: #00D27F;
      text-transform: uppercase;
    }
    /* Border accent */
    .border-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #251720;
    }
    .border-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #251720;
    }
    .border-left {
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: #251720;
    }
    .border-right {
      position: absolute;
      top: 0;
      right: 0;
      width: 3px;
      height: 100%;
      background: #251720;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <!-- Borders -->
    <div class="border-top"></div>
    <div class="border-bottom"></div>
    <div class="border-left"></div>
    <div class="border-right"></div>

    <!-- Grid background -->
    <div class="grid-bg"></div>

    <!-- Large network graph -->
    <div class="network-nodes">
      <!-- Connection lines - creating a complex network -->
      <div class="connection" style="width: 180px; height: 3px; top: 120px; left: 80px; transform: rotate(25deg);"></div>
      <div class="connection" style="width: 140px; height: 3px; top: 200px; left: 150px; transform: rotate(-35deg);"></div>
      <div class="connection" style="width: 160px; height: 3px; top: 280px; left: 200px; transform: rotate(50deg);"></div>
      <div class="connection" style="width: 120px; height: 3px; top: 150px; left: 250px; transform: rotate(-15deg);"></div>
      <div class="connection" style="width: 100px; height: 3px; top: 340px; left: 180px; transform: rotate(70deg);"></div>
      <div class="connection" style="width: 130px; height: 3px; top: 90px; left: 320px; transform: rotate(40deg);"></div>
      <div class="connection" style="width: 110px; height: 3px; top: 230px; left: 380px; transform: rotate(-45deg);"></div>
      <div class="connection" style="width: 90px; height: 3px; top: 300px; left: 420px; transform: rotate(20deg);"></div>

      <!-- Nodes - larger variety -->
      <div class="node node-yellow" style="width: 60px; height: 60px; top: 100px; left: 60px;"></div>
      <div class="node node-emerald" style="width: 72px; height: 72px; top: 180px; left: 140px;"></div>
      <div class="node node-yellow" style="width: 48px; height: 48px; top: 260px; left: 190px;"></div>
      <div class="node node-emerald" style="width: 64px; height: 64px; top: 320px; left: 160px;"></div>
      <div class="node node-yellow" style="width: 56px; height: 56px; top: 380px; left: 240px;"></div>
      <div class="node node-emerald" style="width: 68px; height: 68px; top: 140px; left: 240px;"></div>
      <div class="node node-yellow" style="width: 52px; height: 52px; top: 80px; left: 310px;"></div>
      <div class="node node-emerald" style="width: 60px; height: 60px; top: 160px; left: 360px;"></div>
      <div class="node node-yellow" style="width: 44px; height: 44px; top: 210px; left: 380px;"></div>
      <div class="node node-emerald" style="width: 56px; height: 56px; top: 280px; left: 410px;"></div>
      <div class="node node-yellow" style="width: 64px; height: 64px; top: 340px; left: 370px;"></div>
      <div class="node node-emerald" style="width: 48px; height: 48px; top: 400px; left: 440px;"></div>
      <div class="node node-yellow" style="width: 52px; height: 52px; top: 120px; left: 480px;"></div>
      <div class="node node-emerald" style="width: 58px; height: 58px; top: 240px; left: 520px;"></div>
    </div>

    <!-- Main content -->
    <div class="content">
      <h1>EMERGENCE</h1>
      <div class="date">APRIL 28-30, 2026 // LONDON</div>
    </div>
  </div>

  <script>
    console.log('Screenshot this at 1500x500px (Twitter header dimensions)');
    console.log('V4 - Network Heavy: Large abstract network graph with smaller text');
  </script>
</body>
</html>
