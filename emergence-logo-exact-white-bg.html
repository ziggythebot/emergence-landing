<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergence Logo - Exact White Background</title>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #FFFFFF;
    }
    .logo-container {
      width: 1080px;
      height: 1080px;
      background: #FFFFFF;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-circle {
      width: 400px;
      height: 400px;
      background: #FFD600;
      border: 12px solid #251720;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 16px 16px 0px #251720;
      position: relative;
    }
    .logo-letter {
      font-family: 'Epilogue', sans-serif;
      font-weight: 900;
      font-size: 200px;
      color: #251720;
      line-height: 1;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="logo-circle">
      <div class="logo-letter">E</div>
    </div>
  </div>
</body>
</html>
